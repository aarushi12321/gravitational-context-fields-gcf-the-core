<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GCF Memory System</title>
    <link
      rel="stylesheet"
      href="/repos/gcf-chatbot/src/styles.css?v=response-memory-1"
    />
  </head>
  <body>
    <main class="app-shell">
      <header class="stats-bar" aria-label="Live field stats">
        <div class="brand">
          <strong>GCF MEMORY HIERARCHY</strong>
          <span>external L1/L2/L3 memory context for a base model</span>
        </div>
        <div id="stats" class="stats"></div>
      </header>

      <section class="dashboard">
        <section class="panel memory-panel" aria-label="Memory map">
          <div class="panel-head">
            <div>
              <p class="kicker">Panel 1</p>
              <h1>Memory Map</h1>
            </div>
            <span class="mono" id="fieldAge">field update: idle</span>
          </div>
          <div id="tierLanes" class="tier-lanes"></div>
        </section>

        <div
          class="splitter"
          data-splitter="left"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize memory map panel"
        ></div>

        <section
          class="panel heatmap-panel"
          aria-label="Gravity field heatmap"
        >
          <div class="panel-head compact">
            <div>
              <p class="kicker">Panel 2</p>
              <h2>Gravity Field Heatmap</h2>
            </div>
            <span class="mono">10 x 10 chunk grid</span>
          </div>
          <div class="axis-label x-axis">x = chunk index</div>
          <div class="heatmap-wrap">
            <div class="axis-label y-axis">y = semantic cluster group</div>
            <div id="heatmap" class="heatmap"></div>
          </div>
        </section>

        <div
          class="splitter"
          data-splitter="right"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize model console panel"
        ></div>

        <section class="panel io-panel" aria-label="Query outputs and input">
          <div class="panel-head compact">
            <div>
              <p class="kicker">Panel 3</p>
              <h2>Model Console</h2>
            </div>
            <button id="randomTurnBtn" class="secondary-btn" type="button">
              Inject random turn
            </button>
          </div>
          <div class="query-output-wrap">
            <div class="assembler-head">
              <span class="mono">chat history</span>
              <span class="mono">newest first</span>
            </div>
            <div id="queryOutputs" class="query-outputs"></div>
          </div>
          <form id="chatForm" class="chat-form">
            <input
              id="chatInput"
              autocomplete="off"
              placeholder="Type a turn: TCP congestion, transformer attention, Roman trade, fermentation..."
            />
            <button type="submit">Submit Query</button>
          </form>
        </section>
      </section>
    </main>

    <dialog id="chunkModal" class="chunk-modal">
      <div class="modal-head">
        <div>
          <p class="kicker">Knowledge Chunk</p>
          <h2 id="modalTitle">C0000</h2>
        </div>
        <button
          id="modalClose"
          type="button"
          aria-label="Close knowledge popup"
        >
          Close
        </button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </dialog>

    <script>
      (function () {
        try {
          var beacon = new Image();
          beacon.src = "/api/beacon?kind=boot&message=index_loaded&href=" + encodeURIComponent(location.href) + "&t=" + Date.now();
        } catch (_) {}

        function post(level, kind, message, stack) {
          try {
            fetch("/api/client-log", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                level: level,
                kind: kind,
                message: message,
                stack: stack,
                href: location.href,
                ua: navigator.userAgent
              })
            });
          } catch (_) {}
        }

        window.addEventListener("error", function (event) {
          post("error", "window.error", String(event.message || "script error"), event.error && event.error.stack);
        });

        window.addEventListener("unhandledrejection", function (event) {
          var reason = event.reason;
          post("error", "unhandledrejection", String(reason && (reason.message || reason) || "unhandled rejection"), reason && reason.stack);
        });

        post("info", "boot", "index.html loaded", null);
      })();
    </script>

    <script
      type="module"
      src="/repos/gcf-chatbot/src/app.js?v=response-memory-1"
    ></script>
  </body>
</html>
